<!doctype html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::section}, 'Accueil - Quiz')}">
<section class="hero card border-0 shadow-lg">
    <div class="card-body p-4 p-md-5">
        <div class="row align-items-center g-4">
            <div class="col-md-7">
                <h1 class="display-6 fw-bold mb-2">VIELO quiz</h1>
                <p class="lead mb-4 text-muted">
                    Choisis une matière, réponds aux questions, et vois ton score.
                </p>

                <form class="row g-3" th:action="@{/start}" method="post">
                    <div class="col-12 col-md-7">
                        <label class="form-label fw-semibold">Matière</label>
                        <select class="form-select form-select-lg" name="subject" required>
                            <option value="ENGLISH">Anglais</option>
                            <option value="MATH">Maths</option>
                            <option value="CHEMISTRY">Chimie</option>
                            <option value="MIXED">Mixte (les 3)</option>
                        </select>
                    </div>

                    <div class="col-12 col-md-5">
                        <label class="form-label fw-semibold">Nombre de questions</label>
                        <input class="form-control form-control-lg" type="number" min="1" max="10" name="count" value="5">
                    </div>

                    <div class="col-12">
                        <button class="btn btn-primary btn-lg px-4">
                            Démarrer le quiz
                        </button>
                    </div>
                </form>
            </div>

            <div class="col-md-5">
                <div class="feature-grid">
                    <div class="feature">
                        <div class="feature-icon">⚡</div>
                        <div>
                            <div class="fw-semibold">Rapide</div>
                            <div class="text-muted small">Interface simple et claire</div>
                        </div>
                    </div>
                    <div class="feature">
                        <div class="feature-icon">🎯</div>
                        <div>
                            <div class="fw-semibold">Score</div>
                            <div class="text-muted small">Résultat immédiat</div>
                        </div>
                    </div>
                    <div class="feature">
                        <div class="feature-icon">🎲</div>
                        <div>
                            <div class="fw-semibold">Aléatoire</div>
                            <div class="text-muted small">Questions mélangées</div>
                        </div>
                    </div>
                </div>

                <div class="mt-4 p-3 rounded-4 bg-light border">
                    <div class="small text-muted">
                       
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
</html>
